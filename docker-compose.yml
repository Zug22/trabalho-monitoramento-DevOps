services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: backend-cpp
    ports:
      - "8080:8080"
    volumes:
      - ./prometheus.yml:/app/prometheus.yml:ro
      - ./condicoes_alerta.yml:/app/condicoes_alerta.yml:ro
      - ./config_alertas.yml:/app/config_alertas.yml:ro

  postgres:
    image: postgres:16-alpine
    container_name: monitoramento-postgres
    environment:
      POSTGRES_DB: monitoramento
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: monitor123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor -d monitoramento"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://monitor:monitor123@postgres:5432/monitoramento?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./condicoes_alerta.yml:/etc/prometheus/condicoes_alerta.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
      - postgres_exporter
      - blackbox

  blackbox:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    volumes:
      - ./blackbox.yml:/etc/blackbox_exporter/config.yml
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    ports:
      - "9115:9115"

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - ./config_alertas.yml:/etc/alertmanager/config_alertas.yml
    secrets:
      - gmail_app_password
    command:
      - '--config.file=/etc/alertmanager/config_alertas.yml'
    ports:
      - "9093:9093"

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/monitoramento-devops.json
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  grafana-storage:
  postgres-data:
  prometheus-data:

secrets:
  gmail_app_password:
    file: ./secrets/gmail_app_password.txt
